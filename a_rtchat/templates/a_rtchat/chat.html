{% extends 'layouts/blank.html' %} {% block content %}

<wrapper class="block max-w-3xl mx-auto my-8 px-4 sm:px-6">
  <div
    id="chat_window"
    class="h-[calc(100vh-8.5rem)] min-h-[36rem] max-h-[48rem] flex flex-col overflow-hidden rounded-2xl bg-slate-900 shadow-2xl shadow-slate-950/20 ring-1 ring-slate-800"
  >
    <div
      class="flex items-center justify-between border-b border-slate-800 bg-slate-950/80 px-5 py-3 text-sm"
    >
      <div>
        <p class="mb-0 text-xs font-semibold uppercase tracking-wider text-slate-500">Local RAG</p>
        <p class="mb-0 text-sm font-medium text-slate-100">Knowledge chat</p>
      </div>
      <span class="inline-flex items-center gap-2 rounded-full border border-emerald-400/20 bg-emerald-400/10 px-3 py-1 text-xs font-medium text-emerald-300">
        <span class="h-2 w-2 rounded-full bg-emerald-400"></span>
        <span id="online-count"></span>online
      </span>
    </div>
    <div id="chat_container" class="grow overflow-x-hidden overflow-y-auto px-4 py-5 sm:px-5">
      <ul id="chat_messages" class="flex min-h-full flex-col justify-end gap-5">
        {% for message in chat_messages reversed %} 
          {% include 'a_rtchat/chat_message.html' %}
        {% endfor %}
      </ul>
    </div>
    <div class="border-t border-slate-800 bg-slate-950/90 p-4">
        <form id="chat_message_form" class="flex w-full flex-col gap-3 sm:flex-row sm:items-end"
        method="post"
        action="{% url 'home' %}"
        hx-post="{% url 'home' %}"
        hx-target="#chat_messages"
        hx-swap="beforeend"
        _="on htmx:afterRequest reset() me" >
          {% csrf_token %}
          {{ form.body }}
          <button type="submit" class="!h-[3.25rem] w-full shrink-0 !rounded-xl !bg-emerald-500 !px-5 !py-0 text-sm font-semibold !shadow-none transition hover:!bg-emerald-400 focus:outline-none focus:ring-2 focus:ring-emerald-300 focus:ring-offset-2 focus:ring-offset-slate-950 active:scale-[0.98] sm:w-auto">Send</button>
        </form>
    </div>
  </div>
</wrapper>
{% endblock %}

{% block javascript %}
<script>
  
  function scrollToBottom() {
    const container = document.getElementById('chat_container');
    container.scrollTop = container.scrollHeight;
  }
  const messageInput = document.getElementById('id_body');
  if (messageInput) {
    messageInput.value = '';
  }
  scrollToBottom()

</script>
{% endblock %}
